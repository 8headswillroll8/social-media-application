<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/create-post.css" />
    <link rel="icon" href="../assets/graphics/logos/flori-logo-favicon.svg" />
    <title>Flori | Lag post</title>
  </head>
  <body>
    <header class="header">
      <a href="./posts.html">
        <img
          class="header__logo--compact"
          src="/assets/graphics/logos/flori-logo-logomark.svg"
          alt="Flori logomark" />
        <img
          class="header__logo--full"
          src="/assets/graphics/logos/flori-logo-main.svg"
          alt="Flori logo"
      /></a>
      <button class="header__logout" type="button" aria-label="Logg ut">
        <img src="/assets/graphics/icons/icon-log-out.svg" alt="" />
      </button>
    </header>
    <main>
      <section class="create">
        <h1>Hva vil du dele?</h1>
        <form class="create__form" novalidate>
          <!-- image url -->
          <label for="url"></label>
          <input
            type="url"
            name="url"
            id="url"
            placeholder="Lenke til bilde her (lim in URL)"
          />
          <div id="url-feedback" aria-live="polite"></div>
          <!-- image preview dom manipulation -->
          <div class="create__preview visually-hidden">
            <img class="create__preview-img" src="" alt="" />
          </div>
          <!-- caption -->
          <label for="caption" class="visually-hidden">Bildetekst</label>
          <textarea
            id="caption"
            name="caption"
            placeholder="Din bildetekst her"
          ></textarea>
          <div id="caption-feedback" aria-live="polite"></div>
          <div class="create__feedback"></div>
          <button type="submit" class="btn create-btn">
            <span class="btn__text">Del</span>
          </button>
        </form>
      </section>
    </main>
    <nav class="nav" aria-label="Hovednavigasjon">
      <ul class="nav__list">
        <!-- home -->
        <li>
          <a href="../pages/posts.html">
            <img src="../assets/graphics/icons/icon-home.svg" alt="" />
            <span>Hjem</span>
          </a>
        </li>

        <!-- create -->
        <li>
          <a href="#">
            <img src="../assets/graphics/icons/icon-plus.svg" alt="" />
            <span>Opprett</span>
          </a>
        </li>

        <!-- search -->
        <li>
          <a href="#">
            <img src="../assets/graphics/icons/icon-search.svg" alt="" />
            <span>Søk</span>
          </a>
        </li>

        <!-- profile -->
        <li>
          <a href="../pages/user-profile.html">
            <img src="../assets/graphics/icons/icon-profile.svg" alt="" />
            <span>Profil</span>
          </a>
        </li>
      </ul>
    </nav>
    <script type="module" src="../js/pages/createPost.js"></script>
  </body>
</html>
